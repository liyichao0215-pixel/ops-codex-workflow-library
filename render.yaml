services:
  - type: web
    name: ops-codex-workflow-library
    runtime: node
    plan: free
    buildCommand: DATA_SOURCE=sqlite node --test apps/api/tests/*.test.mjs scripts/tests/*.test.mjs
    startCommand: node apps/api/server.mjs
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: ADMIN_TOKEN
        sync: false
      - key: PUBLIC_ORIGINS
        value: https://ops-codex-workflow-library.onrender.com
      - key: OPS_DB_PATH
        value: /tmp/ops-assets.sqlite
      - key: DATA_SOURCE
        value: feishu
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_BASE_APP_TOKEN
        sync: false
      - key: FEISHU_ASSETS_TABLE_ID
        sync: false
      - key: FEISHU_SUBMISSIONS_TABLE_ID
        sync: false
      - key: FEISHU_DUPLICATES_TABLE_ID
        sync: false
      - key: FEISHU_AUDIT_TABLE_ID
        sync: false
      - key: FEISHU_WIKI_HOME_URL
        sync: false
